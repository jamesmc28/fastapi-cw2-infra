- hosts: web
  become: yes

  tasks:

    - name: Update packages
      yum:
        name: "*"
        state: latest

    - name: Install required packages
      yum:
        name:
          - docker
          - python3
          - python3-pip
        state: present

    - name: Install Python Docker SDK + requests
      pip:
        name:
          - docker
          - requests

    - name: Start Docker
      service:
        name: docker
        state: started
        enabled: yes

    - name: Add ec2-user to docker group
      user:
        name: ec2-user
        groups: docker
        append: yes

    - name: Restart Docker
      service:
        name: docker
        state: restarted
