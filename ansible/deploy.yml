- hosts: web
  become: yes

  vars:
    image_tag: latest   # default (overridden by Jenkins)

  tasks:

    - name: Pull Docker image
      docker_container:
        name: fastapi-app
        image: "james2835/fastapi-app:{{ image_tag }}"
        state: started
        restart_policy: always
        ports:
          - "80:80"
